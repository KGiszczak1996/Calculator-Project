<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <script src="./code.js"></script>
    <title>Calculator</title>
  </head>
  <body>
    <main>
      <div class="block">
        <div class="container">
          <input class="btn" type="button" value="9" onclick="input(9)" />
          <input class="btn" type="button" value="8" onclick="input(8)" />
          <input class="btn" type="button" value="7" onclick="input(7)" />
          <input class="btn" type="button" value="6" onclick="input(6)" />
          <input class="btn" type="button" value="5" onclick="input(5)" />
          <input class="btn" type="button" value="4" onclick="input(4)" />
          <input class="btn" type="button" value="3" onclick="input(3)" />
          <input class="btn" type="button" value="2" onclick="input(2)" />
          <input class="btn" type="button" value="1" onclick="input(1)" />
          <input class="btn" type="button" value="0" onclick="input(0)" />
          <input class="btn" type="button" value="." onclick="input('.')" />
          <input
            class="btn clear"
            type="button"
            value="C"
            onclick="input('C')"
          />
          <input class="btn eq1" type="button" value="+" onclick="input('+')" />
          <input class="btn eq2" type="button" value="-" onclick="input('-')" />
          <input class="btn eq3" type="button" value="*" onclick="input('*')" />
          <input class="btn eq4" type="button" value="/" onclick="input('/')" />
          <input class="btn eq5" type="button" value="=" onclick="input('=')" />
          <input
            class="result"
            id="end"
            type="text"
            placeholder="0"
            oninput="(input(symbol))"
          />
        </div>
      </div>
    </main>
  </body>
</html>
